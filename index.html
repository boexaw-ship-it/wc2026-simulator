<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0d1117] text-white font-sans antialiased">

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-[#12161f] shadow-2xl relative">
        
        <header class="p-4 border-b border-gray-800 bg-[#161b26] sticky top-0 z-50">
            <h1 class="text-xl font-black text-center tracking-wider text-amber-500">FIFA WORLD CUP 2026</h1>
            <p class="text-xs text-gray-400 text-center mt-1">Interactive Bracket Simulator (MMT)</p>
        </header>

        <nav class="flex overflow-x-auto no-scrollbar bg-[#161b26] border-b border-gray-800 sticky top-[60px] z-50 px-2 py-3 gap-2 snap-x">
            <button onclick="switchStage('TABLE')" id="tab-TABLE" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-amber-500 text-black transition-all">Group Tables</button>
            <button onclick="switchStage('FIX')" id="tab-FIX" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-gray-800 text-gray-400 transition-all">Fixtures</button>
            <button onclick="switchStage('R32')" id="tab-R32" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-gray-800 text-gray-400 transition-all">Round of 32</button>
            <button onclick="switchStage('R16')" id="tab-R16" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-gray-800 text-gray-400 transition-all">Round of 16</button>
            <button onclick="switchStage('QF')" id="tab-QF" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-gray-800 text-gray-400 transition-all">Quarter-Finals</button>
            <button onclick="switchStage('SF')" id="tab-SF" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-gray-800 text-gray-400 transition-all">Semi-Finals</button>
            <button onclick="switchStage('F')" id="tab-F" class="snap-center shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-gray-800 text-gray-400 transition-all">Final</button>
        </nav>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <section id="view-TABLE" class="stage-view block space-y-6">
                <div id="tables-container" class="space-y-6"></div>
            </section>

            <section id="view-FIX" class="stage-view hidden space-y-4">
                <div class="flex justify-center gap-2 bg-[#161b26] p-1.5 rounded-xl border border-gray-800">
                    <button onclick="switchMatchday(1)" id="md-btn-1" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-amber-500 text-black transition-all">MD 1</button>
                    <button onclick="switchMatchday(2)" id="md-btn-2" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-transparent text-gray-400 transition-all">MD 2</button>
                    <button onclick="switchMatchday(3)" id="md-btn-3" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-transparent text-gray-400 transition-all">MD 3</button>
                </div>
                <div id="fixtures-container" class="space-y-4"></div>
            </section>

            <section id="view-KO" class="stage-view hidden">
                <h2 id="ko-title" class="text-sm font-bold text-gray-400 mb-4 tracking-wider uppercase"></h2>
                <div id="ko-matches-container" class="space-y-3"></div>
            </section>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
